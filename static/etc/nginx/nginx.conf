user wall-e;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/wall-e/nginx.access.log;
    error_log /var/log/wall-e/nginx.error.log notice;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    client_body_temp_path /var/cache/nginx/client_temp;
    proxy_temp_path /var/cache/nginx/proxy_temp;
    fastcgi_temp_path /var/cache/nginx/fastcgi_temp;
    uwsgi_temp_path /var/cache/nginx/uwsgi_temp;
    scgi_temp_path /var/cache/nginx/scgi_temp;

    # Admin-managed local routing. Snippets should bind loopback/high ports only.
    include /etc/nginx/conf.d/*.conf;

    # User/project local routes managed by wall-e agents.
    include /home/wall-e/.config/nginx/conf.d/*.conf;
}
