# Project documentation (built from docs/source via Sphinx).
# Served at /wall-e/docs/ on the container's nginx listener (0.0.0.0:80).
# Exposed externally via Docker -p 6080:80, so reach it at:
#   http://localhost:6080/wall-e/docs/
#
# This file is included inside the base `server` block in
# /etc/nginx/nginx.conf, so it must define `location` blocks only.

# Bare path -> trailing slash so relative links in the Sphinx output resolve.
# Use $http_host (not the default $host) so the port from the Host header is
# preserved across Docker -p port mappings.
location = /wall-e/docs {
    return 301 http://$http_host/wall-e/docs/;
}

location /wall-e/docs/ {
    alias /usr/share/wall-e/docs/;
    index index.html;
    try_files $uri $uri/ =404;
}
