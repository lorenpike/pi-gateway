<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>wall-e sessions</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, -apple-system, Segoe UI, sans-serif; }
    body { margin: 2rem; max-width: 1000px; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    button { cursor: pointer; padding: .45rem .7rem; border-radius: .45rem; border: 1px solid #8886; background: #8882; }
    .muted { color: #777; }
    .group { margin-top: 1.5rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: .55rem .4rem; border-bottom: 1px solid #8883; text-align: left; vertical-align: top; }
    th { font-size: .85rem; color: #777; font-weight: 600; }
    .error { color: #b00020; white-space: pre-wrap; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>wall-e sessions</h1>
      <p class="muted">Local read-only session introspection.</p>
    </div>
    <button id="reload">Load sessions</button>
  </header>
  <main id="content"><p class="muted">Click “Load sessions”.</p></main>

<script>
const content = document.getElementById('content');
document.getElementById('reload').addEventListener('click', loadSessions);

function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s);
  return Number.isNaN(d.getTime()) ? s : d.toLocaleString();
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

async function loadSessions() {
  content.innerHTML = '<p class="muted">Loading…</p>';
  try {
    const res = await fetch('/v1/sessions');
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}\n${await res.text()}`);
    const data = await res.json();
    render(data.sessions || []);
  } catch (err) {
    content.innerHTML = `<p class="error">${escapeHtml(err.message || err)}</p>`;
  }
}

function render(sessions) {
  if (sessions.length === 0) {
    content.innerHTML = '<p class="muted">No sessions found.</p>';
    return;
  }
  const groups = new Map();
  for (const s of sessions) {
    const k = s.channelType || 'unknown';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(s);
  }
  let html = '';
  for (const [type, rows] of groups) {
    html += `<section class="group"><h2>${escapeHtml(type)}</h2><table>`;
    html += '<thead><tr><th>Date</th><th>Name</th><th>Messages</th><th>CWD</th><th></th></tr></thead><tbody>';
    for (const s of rows) {
      html += '<tr>';
      html += `<td><time datetime="${escapeHtml(s.createdAt)}">${escapeHtml(fmtDate(s.createdAt))}</time></td>`;
      html += `<td>${escapeHtml(s.name || '(unnamed)')}</td>`;
      html += `<td>${Number(s.messageCount || 0)}</td>`;
      html += `<td class="muted">${escapeHtml(s.cwd || '')}</td>`;
      html += `<td><button data-export="${escapeHtml(s.key)}">Export HTML</button></td>`;
      html += '</tr>';
    }
    html += '</tbody></table></section>';
  }
  content.innerHTML = html;
  content.querySelectorAll('[data-export]').forEach(btn => btn.addEventListener('click', () => exportSession(btn.dataset.export)));
}

async function exportSession(key) {
  const res = await fetch(`/v1/sessions/${encodeURIComponent(key)}/export.html`);
  if (!res.ok) {
    alert(`Export failed: ${res.status} ${res.statusText}\n${await res.text()}`);
    return;
  }
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  window.open(url, '_blank', 'noopener');
  setTimeout(() => URL.revokeObjectURL(url), 60_000);
}

loadSessions();
</script>
</body>
</html>
